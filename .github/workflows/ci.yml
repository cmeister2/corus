name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build libraries and test binaries
        run: |
          cargo build -p corus-syscall --all-targets
          cargo build -p corus-core --all-targets
          cargo build -p corus
          cargo test --workspace --no-run

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-nextest
      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils build-essential elfutils gdb
      # The fork-snapshot dump strategy PTRACE_ATTACHes from a clone()d helper
      # back to the process's own threads. Yama's default ptrace_scope=1 denies
      # this cross-task attach (EPERM), so relax it for the test run. Corus does
      # not silently degrade when the attach is denied - it fails the dump - so
      # the environment must permit ptrace for the fork-snapshot path to work.
      - name: Allow ptrace (Yama scope) for fork-snapshot dumps
        run: sudo sysctl -w kernel.yama.ptrace_scope=0
      # Fast gate: verify the lister's raw primitives (clone/getdents/ptrace)
      # work before running the full suite, so a regression points at the
      # primitive rather than an opaque dump failure.
      - name: Lister primitives smoke test
        run: cargo run -p corus --example lister_primitives
      - name: Crash-handler example (dump from a signal handler)
        run: cargo run -p corus --example crash_handler
      - run: make tests
      - name: Archive C unit test output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: original-c-unit-output-x86_64
          path: target/original-c-unit/output.txt
          if-no-files-found: ignore

  cross-aarch64:
    name: Cross-compile (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install aarch64 cross linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cross-build and lint aarch64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --workspace --target aarch64-unknown-linux-gnu
          cargo clippy --workspace --target aarch64-unknown-linux-gnu -- -D warnings

  test-aarch64:
    name: Test (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-nextest
      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils build-essential elfutils gdb
      # The fork-snapshot dump strategy PTRACE_ATTACHes from a clone()d helper
      # back to the process's own threads. Yama's default ptrace_scope=1 denies
      # this cross-task attach (EPERM), so relax it for the test run. Corus does
      # not silently degrade when the attach is denied - it fails the dump - so
      # the environment must permit ptrace for the fork-snapshot path to work.
      - name: Allow ptrace (Yama scope) for fork-snapshot dumps
        run: sudo sysctl -w kernel.yama.ptrace_scope=0
      # Fast gate: verify the lister's raw primitives (clone/getdents/ptrace)
      # work before running the full suite, so a regression points at the
      # primitive rather than an opaque dump failure.
      - name: Lister primitives smoke test
        run: cargo run -p corus --example lister_primitives
      - name: Crash-handler example (dump from a signal handler)
        run: cargo run -p corus --example crash_handler
      - run: make tests
      - name: Archive C unit test output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: original-c-unit-output-aarch64
          path: target/original-c-unit/output.txt
          if-no-files-found: ignore

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
          targets: x86_64-unknown-linux-gnu
      - run: cargo fmt --all --check

  publish-dry-run:
    name: Publish dry-run
    needs: [build, test, cross-aarch64, test-aarch64, clippy, fmt]
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: ./publish.sh --dry-run 0.0.${{ github.run_id }}

  release:
    name: Release
    needs: [build, test, cross-aarch64, test-aarch64, clippy, fmt]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: release
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: npx semantic-release

  success:
    name: Success
    needs: [build, test, cross-aarch64, test-aarch64, clippy, fmt, publish-dry-run, release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check required jobs
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.test.result }}
          CROSS_AARCH64_RESULT: ${{ needs.cross-aarch64.result }}
          TEST_AARCH64_RESULT: ${{ needs.test-aarch64.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          FMT_RESULT: ${{ needs.fmt.result }}
          DRY_RUN_RESULT: ${{ needs.publish-dry-run.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
        run: |
          test "${BUILD_RESULT}" = success
          test "${TEST_RESULT}" = success
          test "${CROSS_AARCH64_RESULT}" = success
          test "${TEST_AARCH64_RESULT}" = success
          test "${CLIPPY_RESULT}" = success
          test "${FMT_RESULT}" = success
          case "${DRY_RUN_RESULT}" in success|skipped) ;; *) exit 1 ;; esac
          case "${RELEASE_RESULT}" in success|skipped) ;; *) exit 1 ;; esac
          echo "All checks passed"
